<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicador Libras</title>
    <style>
        /* Tela inteira, sem barras de rolagem */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Texto de instrução no fundo */
        .area-conteudo {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            text-align: center;
        }

        .instrucao {
            font-size: 18px;
            color: #555;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 1;
        }

        /* 
           O SEGREDO DO CENTRO: 
           Desprendemos a raiz do widget do canto e movemos para o meio absoluto da tela.
        */
        div[vw] {
            position: fixed !important;
            top: 45% !important; /* Ligeiramente acima do centro para dar espaço para a barra */
            left: 50% !important;
            right: auto !important;
            bottom: auto !important;
            transform: translate(-50%, -50%) !important;
            margin: 0 !important;
            z-index: 1000 !important;
        }

        /* RESPONSIVIDADE: Aumenta o tamanho do boneco apenas se estiver no PC */
        @media (min-width: 768px) {
            div[vw] {
                transform: translate(-50%, -50%) scale(1.5) !important; 
            }
        }

        /* BARRA INFERIOR DE CONTROLES */
        .area-controles {
            height: 90px;
            background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center; /* Mantém a barra de pesquisa no meio na tela do PC */
            padding: 0 20px;
            gap: 15px;
            z-index: 99999;
            position: fixed; 
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"] {
            flex-grow: 1;
            max-width: 800px; /* Impede que a barra fique comprida demais no PC */
            height: 55px;
            font-size: 20px;
            padding: 0 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        
        button {
            height: 55px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        #btnMicrofone {
            background-color: #007bff;
            width: 70px;
            font-size: 24px;
        }
        #btnMicrofone:active, #btnMicrofone.gravando {
            background-color: #dc3545; 
        }
    </style>
</head>
<body>

    <div class="area-conteudo">
        <div class="instrucao">
            <strong>1.</strong> Clique no botão azul no centro para abrir o avatar.<br><br>
            <strong>2.</strong> Fale no microfone ou digite na barra inferior para traduzir.
        </div>
    </div>

    <!-- Widget NATIVO do VLibras -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <!-- Barra Inferior -->
    <div class="area-controles">
        <input type="text" id="campoTexto" placeholder="Fale ou digite aqui e aperte Enter..." autocomplete="off">
        <button id="btnMicrofone" title="Falar">🎤</button>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        // Inicia o widget
        new window.VLibras.Widget('https://vlibras.gov.br/app');

        // Lógica de Tradução
        const campoTexto = document.getElementById('campoTexto');
        const btnMicrofone = document.getElementById('btnMicrofone');

        function traduzirTexto(texto) {
            if (!texto.trim()) return;
            if (window.plugin && typeof window.plugin.translate === 'function') {
                window.plugin.translate(texto);
            }
        }

        campoTexto.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                traduzirTexto(campoTexto.value);
                campoTexto.value = ''; 
            }
        });

        // Lógica de Voz
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;

            recognition.onstart = () => {
                btnMicrofone.classList.add('gravando');
                campoTexto.placeholder = "Ouvindo...";
            };

            recognition.onresult = (event) => {
                const fala = event.results[0][0].transcript;
                campoTexto.value = fala; 
                traduzirTexto(fala);     
            };

            recognition.onend = () => {
                btnMicrofone.classList.remove('gravando');
                campoTexto.placeholder = "Fale ou digite aqui e aperte Enter...";
            };

            btnMicrofone.addEventListener('click', () => {
                recognition.start();
            });
        } else {
            btnMicrofone.style.display = 'none';
            campoTexto.placeholder = "Voz não suportada neste navegador.";
        }
    </script>
</body>
</html>
