<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicador Libras</title>
    <style>
        /* Tela inteira, sem barras de rolagem */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Texto de instrução no fundo */
        .area-conteudo {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            text-align: center;
        }

        .instrucao {
            font-size: 18px;
            color: #555;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 1;
        }

        /* Posicionamento do VLibras no Centro */
        div[vw] {
            position: fixed !important;
            top: 45% !important; 
            left: 50% !important;
            right: auto !important;
            bottom: auto !important;
            transform: translate(-50%, -50%) !important;
            margin: 0 !important;
            z-index: 1000 !important;
        }

        /* Responsividade para PC */
        @media (min-width: 768px) {
            div[vw] {
                transform: translate(-50%, -50%) scale(1.5) !important; 
            }
        }

        /* BARRA INFERIOR DE CONTROLES */
        .area-controles {
            height: 90px;
            background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center; 
            padding: 0 20px;
            gap: 10px;
            z-index: 99999;
            position: fixed; 
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"] {
            flex-grow: 1;
            max-width: 800px; 
            height: 55px;
            font-size: 20px;
            padding: 0 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        
        button {
            height: 55px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            font-size: 24px;
            width: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btnMicrofone {
            background-color: #007bff;
        }
        #btnMicrofone:active, #btnMicrofone.gravando {
            background-color: #dc3545; /* Vermelho gravando */
        }

        #btnFalarTexto {
            background-color: #28a745; /* Verde para o alto-falante */
        }
        #btnFalarTexto:active {
            background-color: #1e7e34;
        }
    </style>
</head>
<body>

    <div class="area-conteudo">
        <div class="instrucao">
            <strong>1.</strong> Clique no botão azul no centro para abrir o avatar.<br><br>
            <strong>2.</strong> Fale no <strong>microfone 🎤</strong> para traduzir para Libras.<br>
            <strong>3.</strong> Digite o texto e clique no <strong>alto-falante 🔊</strong> para ouvir em voz alta.
        </div>
    </div>

    <!-- Widget NATIVO do VLibras -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <!-- Barra Inferior -->
    <div class="area-controles">
        <input type="text" id="campoTexto" placeholder="Fale ou digite aqui..." autocomplete="off">
        <button id="btnFalarTexto" title="Ler texto em voz alta">🔊</button>
        <button id="btnMicrofone" title="Falar">🎤</button>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        // Inicia o widget do VLibras
        new window.VLibras.Widget('https://vlibras.gov.br/app');

        const campoTexto = document.getElementById('campoTexto');
        const btnMicrofone = document.getElementById('btnMicrofone');
        const btnFalarTexto = document.getElementById('btnFalarTexto');

        // ==========================================
        // 1. LÓGICA DE TRADUÇÃO PARA LIBRAS (Enter)
        // ==========================================
        function traduzirTexto(texto) {
            if (!texto.trim()) return;
            if (window.plugin && typeof window.plugin.translate === 'function') {
                window.plugin.translate(texto);
            }
        }

        campoTexto.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                traduzirTexto(campoTexto.value);
                campoTexto.value = ''; 
            }
        });

        // ==========================================
        // 2. LÓGICA DE TEXTO PARA VOZ (Alto-falante)
        // ==========================================
        btnFalarTexto.addEventListener('click', () => {
            const textoParaFalar = campoTexto.value.trim();
            
            if (textoParaFalar !== "") {
                const sintese = window.speechSynthesis;
                const fala = new SpeechSynthesisUtterance(textoParaFalar);
                
                fala.lang = 'pt-BR'; // Define o idioma português do Brasil
                fala.rate = 1.0;     // Velocidade normal da fala
                fala.pitch = 1.0;    // Tom de voz normal
                
                sintese.speak(fala); // O dispositivo fala o texto
            } else {
                alert("Digite algum texto na barra para ser lido em voz alta.");
            }
        });

        // ==========================================
        // 3. LÓGICA DE VOZ PARA TEXTO (Microfone)
        // ==========================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;

            recognition.onstart = () => {
                btnMicrofone.classList.add('gravando');
                campoTexto.placeholder = "Ouvindo...";
            };

            recognition.onresult = (event) => {
                const fala = event.results[0][0].transcript;
                campoTexto.value = fala; 
                traduzirTexto(fala);     
            };

            recognition.onend = () => {
                btnMicrofone.classList.remove('gravando');
                campoTexto.placeholder = "Fale ou digite aqui...";
            };

            btnMicrofone.addEventListener('click', () => {
                recognition.start();
            });
        } else {
            btnMicrofone.style.display = 'none';
            campoTexto.placeholder = "Voz não suportada neste navegador.";
        }
    </script>
</body>
</html>
